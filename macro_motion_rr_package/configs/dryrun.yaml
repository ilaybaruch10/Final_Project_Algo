# Tiny config for an end-to-end smoke test on CPU with synthetic data.
# NOT for real training — see default.yaml for the real settings.
seed: 42

data:
  input_size: 64
  clip_frames: 60
  raw_fps: 30.0
  normalize: true

model:
  d_model: 128
  n_heads: 4
  depth: 2
  dropout: 0.1
  ff_mult: 2
  max_len: 64
  temporal_downsample: 3
  use_pretrained_resnet: false     # smoke test: random ResNet-50, no weight download
  freeze_resnet_until: ""
  include_temp_path: false
  use_domain_token: false
  unet_base: 16

train:
  epochs: 1
  batch_size: 2
  lr: 0.0002
  weight_decay: 0.01
  num_workers: 0
  amp: false
  grad_clip: 1.0
  rr_loss: huber
  huber_delta: 2.0
  rr_smooth_w: 0.05
  temp_loss_weight_blanket: 0.3
  temp_loss_weight_exposed: 1.0
  save_every: 1
