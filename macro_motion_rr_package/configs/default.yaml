seed: 42

data:
  input_size: 512
  clip_frames: 600
  raw_fps: 30.0
  normalize: true

model:
  d_model: 512
  n_heads: 8
  depth: 6
  dropout: 0.1
  ff_mult: 4
  max_len: 700
  temporal_downsample: 3
  use_pretrained_resnet: true      # frozen built-in PyTorch ResNet-50
  freeze_resnet_until: ""        # ignored; ResNet is fully frozen
  include_temp_path: false
  use_domain_token: false       # false for RR-only; true when using RR+Temp shared transformer
  unet_base: 32

train:
  epochs: 50
  batch_size: 2
  lr: 0.0002
  weight_decay: 0.01
  num_workers: 4
  amp: true
  grad_clip: 1.0
  rr_loss: huber
  huber_delta: 2.0
  rr_smooth_w: 0.05
  temp_loss_weight_blanket: 0.3
  temp_loss_weight_exposed: 1.0
  save_every: 10
